name: Download and Split Kindle Firmware

on:
  workflow_dispatch:

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download firmware
        run: |
          curl -L -o kindle_voyage_5.13.6.bin \
            "https://s3.amazonaws.com/kindledownloads/Kindle_src_5.19.4.0.1_4767240003.tar.gz"
          ls -lh kindle_voyage_5.13.6.bin

      - name: Split into parts
        run: |
          mkdir -p source
          split -b 90m kindle_voyage_5.13.6.bin firmware/Kindle_src_5.19.4.0.1.part
          ls -lh source/

      - name: Commit and push parts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add source/
          git commit -m "Add Kindle 5.19.2 firmware parts"
          git push
